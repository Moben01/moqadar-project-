{% load static %}
{% if request.user.is_authenticated %}
    <script>
        window.location.href = '{% url "Home:dashboard" %}';
    </script>

{% else %}
<div class="auth-layout-wrap" style="background-image: url('{% static 'images/logingbg.jpg' %}')">
    <div class="auth-content" style="font-family: XW_Zar_Bd_0;">
        <div class="card o-hidden">
            <div class="row">
                <div class="col-md-12">
                    <div class="p-4">
                        <div class="auth-logo text-center mb-4"><img src="{% static 'images/logo.png' %}" alt=""></div>
                        <h1 class="mb-3 text-18">‌داخل شدن به سیستم مدیریت A.B.A</h1>
                        <form method="post" action="{% url 'account:login' %}" accept-charset="UTF-8">
                            {% csrf_token %}
                            <div class="form-group">
                                <label for="email">ایمیل آدرس</label>
                                {{ form.username}}
                                <!-- <input class="form-control form-control-rounded" id="email" type="email"> -->
                            </div>
                            <div class="form-group">
                                <label for="password">پسورد</label>
                                {{ form.password}}
                                <!-- <input class="form-control form-control-rounded" id="password" type="password"> -->
                            </div>
                            <button class="btn btn-rounded btn-primary btn-block mt-2" type="submit">داخل شدن</button>
                        </form>
                        <div class="mt-3 text-center"><a class="text-muted" href="forgot.html">
                                <u>پسورد خویش را فراموش کرده اید؟</u></a></div>
                    </div>
                </div>
                
            </div>
        </div>
    </div>
</div>

{% endif %}
